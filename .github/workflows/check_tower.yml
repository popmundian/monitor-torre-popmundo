name: 🔥 Torre Infernal - Monitor

on:
  schedule:
    - cron: "0,15,30,45 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-tower:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Baixar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Instalar dependências
        run: pip install requests beautifulsoup4

      - name: 🔍 Verificar Torre Infernal
        env:
          POPMUNDO_USER:     ${{ secrets.POPMUNDO_USER }}
          POPMUNDO_PASS:     ${{ secrets.POPMUNDO_PASS }}
          POPMUNDO_CHARNAME: ${{ secrets.POPMUNDO_CHARNAME }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_tower.py

      - name: 💾 Salvar estado da torre
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: atualiza estado da torre"
          git push
